name: Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  tests:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        node-version: ['24']
        toolchain: [stable]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run tests
        run: npm ci && npm run test
